name: Update TOC Interface Version
on:
  schedule:
    - cron: '0 12 * * *'   # Daily at noon UTC (idempotent — no-op when version unchanged)
  workflow_dispatch:         # Manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: p3lim/toc-interface-updater@v4
        with:
          flavor: retail
      - uses: peter-evans/create-pull-request@v8
        with:
          title: 'Update TOC Interface version'
          commit-message: 'Update TOC Interface version'
          branch: toc-interface-update
          delete-branch: true
